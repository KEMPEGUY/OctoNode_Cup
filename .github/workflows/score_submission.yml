name: Score Submission

on:
  pull_request:
    paths:
      - "submissions/**"

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout MAIN branch (not PR merge commit)
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2️⃣ Checkout private evaluation repo
      - name: Checkout private evaluation repo
        uses: actions/checkout@v4
        with:
          repository: El-Ikram/Help_repo
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private_eval

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Evaluate submission
      - name: Evaluate submission
        id: eval
        run: |
          SCORE=$(python competition/evaluate.py \
          submissions/submission.csv \
          private_eval/test_labels.csv | grep SCORE | cut -d "=" -f2)
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      # 5️⃣ Append to leaderboard
      - name: Append to leaderboard
        run: |
          echo "${{ github.actor }},GCN,${{ steps.eval.outputs.score }},$(date -u +"%Y-%m-%dT%H:%M:%SZ"),Auto submission" >> leaderboard/leaderboard.csv

      # 6️⃣ Commit & Push to MAIN safely
      - name: Commit leaderboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard/leaderboard.csv
          git commit -m "Auto-update leaderboard for ${{ github.actor }}" || exit 0
          git push origin HEAD:main
